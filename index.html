<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página desde GitHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .card {
            background: #21262d;
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 1rem;
            font-size: 1.7rem;
        }

        .info {
            background: #161b22;
            padding: 1.2rem;
            border-radius: 10px;
            margin: 1.5rem 0;
            border-left: 3px solid #3fb950;
        }

        button {
            background: #238636;
            color: white;
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #2ea043;
            transform: translateY(-2px);
        }

        #resultado {
            margin-top: 1.2rem;
            color: #8b949e;
            font-size: 1.1rem;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #6e7681;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 GitHub Pages</h1>
        <p>Tu página publicada gratis y fácil</p>

        <div class="info">
            <strong>✅ Funciona correctamente</strong>
            <p style="margin-top: 0.5rem; font-size: 0.95rem;">Hosteado en GitHub</p>
        </div>

        <button onclick="accion()">Tocame para probar</button>
        <div id="resultado"></div>

        <div class="footer">
            Hecho con 💙 | Tu Proyecto 2026
        </div>
    </div>

    <script>
        function accion() {
            const caja = document.getElementById('resultado');
            caja.innerHTML = '🎉 ¡Genial! Todo funciona en tu página de GitHub';
            caja.style.color = '#3fb950';
        }
    </script>
</body>
</html>
